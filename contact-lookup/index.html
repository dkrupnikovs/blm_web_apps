<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belam — Contact Lookup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="header-title">
      <img src="logo/belam-logo.jpg" alt="Belam" class="header-logo" />
      Belam — Contact Lookup
    </span>
    <span class="header-user">
      <span id="user-name"></span>
      <a href="/.auth/logout?post_logout_redirect_uri=/contact-lookup/" class="btn-signout">Sign out</a>
    </span>
  </header>

  <main>

    <!-- ── Look up existing contact ── -->
    <div class="card">
      <h2 class="section-title">Look up existing contact</h2>

      <div class="search-row">
        <input type="text" id="inp-number" placeholder="Contact No. (e.g. KP00123)" />
        <button id="btn-lookup" class="btn btn-primary">Look up</button>
      </div>

      <div id="result" class="hidden">
        <table class="result-table">
          <tbody id="result-body"></tbody>
        </table>
      </div>

      <div id="msg-error" class="message error hidden"></div>
    </div>

    <!-- ── Create new contact ── -->
    <div class="card" style="margin-top: 1.25rem;">
      <h2 class="section-title">Create new contact</h2>

      <div class="search-row" style="margin-bottom: 0;">
        <select id="inp-country">
          <option value="">— Select country to start —</option>
        </select>
      </div>

      <div id="create-form" class="hidden">
        <div class="form-grid">
          <label>Type</label>
          <select id="new-type">
            <option value="Company">Company</option>
            <option value="Person">Person</option>
          </select>

          <label>Name <span class="req">*</span></label>
          <input type="text" id="new-name" placeholder="Display name" />

          <label>Registration No.</label>
          <input type="text" id="new-regno" placeholder="" />

          <label>VAT No.</label>
          <input type="text" id="new-vat" placeholder="" />

          <label>Phone</label>
          <input type="text" id="new-phone" placeholder="" />

          <label>Email</label>
          <input type="email" id="new-email" placeholder="" />

          <label>Address</label>
          <input type="text" id="new-addr" placeholder="Street / building" />

          <label>City</label>
          <input type="text" id="new-city" placeholder="" />

          <label>Post Code</label>
          <input type="text" id="new-post" placeholder="" />
        </div>

        <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem; align-items: center;">
          <button id="btn-create" class="btn btn-primary">Create contact</button>
          <span id="msg-create-ok"  class="message success hidden"></span>
          <span id="msg-create-err" class="message error   hidden"></span>
        </div>
      </div>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
